name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Install native dependencies
        run: npx expo install --fix

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup signing config
        run: |
          echo "Creating release signing config..."
          mkdir -p android/keystores
          # Generate a temporary keystore for release (for testing only)
          keytool -genkey -v -keystore android/keystores/release.keystore -storepass android -alias release -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug, O=Android, C=US"
          echo "android.storeFile=../keystores/release.keystore" >> android/gradle.properties
          echo "android.storePassword=android" >> android/gradle.properties
          echo "android.keyAlias=release" >> android/gradle.properties
          echo "android.keyPassword=android" >> android/gradle.properties

      - name: Build Release APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: german-language-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
